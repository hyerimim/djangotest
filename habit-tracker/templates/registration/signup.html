{% extends 'base.html' %}
{% block title %}회원가입 - 습관 트래커{% endblock %}
{% block content %}
<div class="auth-card">
    <h1>회원가입</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-primary">가입하기</button>
    </form>
    <p class="muted">이미 계정이 있으신가요? <a href="{% url 'login' %}">로그인</a></p>
</div>
{% endblock %}
