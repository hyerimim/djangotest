{% extends 'base.html' %}
{% block title %}로그인 - 습관 트래커{% endblock %}
{% block content %}
<div class="auth-card">
    <h1>로그인</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-primary">로그인</button>
    </form>
    <p class="muted">계정이 없으신가요? <a href="{% url 'signup' %}">회원가입</a></p>
</div>
{% endblock %}
