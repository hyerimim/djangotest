{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}습관 트래커{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header class="topbar">
        <a class="brand" href="{% url 'habits:dashboard' %}">🔥 습관 트래커</a>
        <nav>
            {% if user.is_authenticated %}
                <span class="username">{{ user.username }}님</span>
                <form action="{% url 'logout' %}" method="post" class="inline-form">
                    {% csrf_token %}
                    <button type="submit" class="link-btn">로그아웃</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">로그인</a>
                <a href="{% url 'signup' %}">회원가입</a>
            {% endif %}
        </nav>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
